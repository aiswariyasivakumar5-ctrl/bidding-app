apiVersion: apps/v1
kind: Deployment
metadata:
  name: bidding-app
  labels:
    app: bidding-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bidding-app
  template:
    metadata:
      labels:
        app: bidding-app
    spec:
      containers:
        - name: bidding-app
          image: bidding-app:v2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080